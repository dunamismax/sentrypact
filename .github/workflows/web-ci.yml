name: Web CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: apps/web

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libvips
        working-directory: .

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: apps/web

      - name: Run web CI
        env:
          CI: true
          RAILS_ENV: test
        run: bin/ci

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build -t sentrypact-web:ci .
